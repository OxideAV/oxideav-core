name: CI

# Thin shim around the OxideAV org-level reusable workflow. See
# https://github.com/OxideAV/.github for the actual job definitions and
# the input surface. Miri is manual-only (workflow_dispatch); trigger
# it from the Actions UI when arena code changes (PR #12, Shnatsel,
# 2026-05).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    uses: OxideAV/.github/.github/workflows/crate-ci.yml@master
    secrets: inherit
